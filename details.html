<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Transaction Details</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="details-page">

<!-- Header -->

<div class="details-header">

<button id="backBtn">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>

Transaction Details

</h2>

<div></div>

</div>

<!-- Top Card -->

<div class="top-card">

<img
src="assets/logo.png"
class="top-logo">

<p class="small">

Transfer To

</p>

<h3 id="recipientNameText">

Loading...

</h3>

<h1 id="amountText">

₦0.00

</h1>

<div class="success">

<i class="fa-solid fa-circle-check"></i>

Successful

</div>

</div>

<!-- Transaction Card -->

<div class="transaction-card">

<h3>

Transaction Details

</h3>

<div class="row">

<span>

Recipient Details

</span>

<strong
id="recipientDetails">

</strong>

</div>

<div class="row">

<span>

Bank

</span>

<strong
id="bankText">

</strong>

</div>

<div class="row">

<span>

Account Number

</span>

<strong
id="accountText">

</strong>

</div>

<div class="row">

<span>

Transaction Number

</span>

<strong
id="transactionText">

</strong>

</div>

<div class="row">

<span>

Reference Number

</span>

<strong
id="referenceText">

</strong>

</div>

<div class="row">

<span>

Session ID

</span>

<strong
id="sessionText">

</strong>

</div>

<div class="row">

<span>

Payment Method

</span>

<strong>

OWealth

</strong>

</div>

<div class="row">

<span>

Date

</span>

<strong
id="dateText">

</strong>

</div>

</div>

<!-- Buttons -->

<div class="button-area">

<button
class="report-btn">

Report Issue

</button>

<button
id="shareBtn">

Share Receipt

</button>

</div>

</div>

<script
src="js/details.js"></script>

</body>

</html>
